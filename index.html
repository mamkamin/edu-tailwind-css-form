<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Authentication Form | Register</title>
    <link href="style.css" rel="stylesheet"/>
  </head>
  <body class="min-h-screen flex flex-col">
    <header class="flex p-3 bg-orange-100">
      <h1 class="text-xl mr-5">Authentication</h1>
      <div class="flex justify-end grow">
	<a class="mx-3" href="#">
	  <button class="bg-sky-500 hover:bg-sky-700 rounded-full md:px-5 py-1 px-2">
	    Login
	  </button>
	</a>
	<a class="mx-3" href="#">
	  <button class="bg-sky-500 hover:bg-sky-700 rounded-full md:px-5 py-1 px-2">
	    Register
	  </button>
	</a>
      </div>
    </header>
    <main class="flex-1 flex">
      <div class="flex-1 flex justify-center items-center">
	<form class="flex flex-col">
	    <!-- Email -->
	    <label for="email">Email</label>
	    <input class="border p-1 mt-1 mb-5 min-w-xs md:min-w-sm" name="email" type="email" placeholder="john@example.com"/>

	    <!-- Username -->
	    <label for="username">Username</label>
	    <input class="border p-1 mt-1 mb-5 min-w-xs md:min-w-sm" name="username" type="text" placeholder="JohnDoe"/>

	    <!-- Password -->
	    <label for="password">Password</label>
	    <input class="border p-1 mt-1 mb-5 min-w-xs md:min-w-sm" name="password" type="password"/>

	    <!-- Confirm Password -->
	    <label for="confirm-password">Confirm Password</label>
	    <input class="border p-1 mt-1 mb-5 min-w-xs md:min-w-sm" name="confirm-password" type="password"/>

	    <input
	      type="submit"
	      value="Sign Up"
	      class="border text-purple-600 hover:bg-purple-600 hover:text-white rounded-full self-center py-2 px-4"
	      />
	</form>
      </div>
    </main>
    <footer>
    </footer>
  </body>
</html>
